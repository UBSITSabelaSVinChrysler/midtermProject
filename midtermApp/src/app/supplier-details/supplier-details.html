<div class="edit-container" *ngIf="supplier">
    <h2>Edit Supplier Details</h2>
    <hr>
  
    <form #supplierForm="ngForm">
      <div class="form-group">
        <label>Supplier ID (Read-only):</label>
        <input type="text" [value]="supplier.id" readonly class="readonly-field">
      </div>
  
      <div class="form-group">
        <label>Supplier Name:</label>
        <input type="text" [(ngModel)]="supplier.supplierName" name="sName" required>
      </div>
  
      <div class="form-group">
        <label>Location:</label>
        <input type="text" [(ngModel)]="supplier.location" name="sLoc" required>
      </div>
  
      <div class="form-group">
        <label>Email Address:</label>
        <input type="email" [(ngModel)]="supplier.email" name="sEmail" required>
      </div>
  
      <div class="form-group">
        <label>Contact Person:</label>
        <input type="text" [(ngModel)]="supplier.contactPerson" name="sContact" required>
      </div>
  
      <div class="form-group">
        <label>Phone Number:</label>
        <input type="text" [(ngModel)]="supplier.phone" name="sPhone" required>
      </div>
  
      <!-- Requirement: Show ALL properties, including products array -->
      <div class="form-group">
        <label>Products Supplied (Comma separated):</label>
        <input type="text" [ngModel]="supplier.productsSupplied.join(', ')" 
               (ngModelChange)="supplier.productsSupplied = $event.split(',')" 
               name="sProducts">
      </div>
  
      <div class="button-group">
        <button type="button" class="btn-save" (click)="save()">Save Changes</button>
        <button type="button" class="btn-back" (click)="goBack()">Back to List</button>
      </div>
    </form>
  </div>
